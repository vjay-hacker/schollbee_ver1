# ============================================================
# SchoolBee — Staging Deploy
# Auto-deploys on every push to main branch
# ============================================================

name: Deploy — Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (default: latest commit SHA)'
        required: false

jobs:
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging-api.schoolbee.app
    concurrency:
      group: staging-deploy
      cancel-in-progress: false    # Never cancel in-flight deploys

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || github.sha }}"
          echo "tag=${TAG:0:8}" >> $GITHUB_OUTPUT
          echo "full_tag=${TAG}" >> $GITHUB_OUTPUT

      # ── Build & Push Docker Image ────────────────────────
      - name: Set up QEMU (multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            schoolbee/api:staging
            schoolbee/api:staging-${{ steps.tag.outputs.tag }}
          cache-from: type=registry,ref=schoolbee/api:staging
          cache-to: type=inline
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      # ── Run DB Migrations on Staging ─────────────────────
      - name: Run Supabase migrations (staging)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_STAGING_PROJECT_ID }}
        run: |
          npm install -g supabase@latest
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase db push --password $SUPABASE_DB_PASSWORD

      # ── Deploy to Staging Server via SSH ─────────────────
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          script: |
            set -e
            echo "=== Pulling new image ==="
            docker pull schoolbee/api:staging-${{ steps.tag.outputs.tag }}
            
            echo "=== Updating compose with new tag ==="
            cd /opt/schoolbee
            export IMAGE_TAG=staging-${{ steps.tag.outputs.tag }}
            
            echo "=== Rolling restart (zero-downtime) ==="
            docker compose -f docker/docker-compose.prod.yml up -d --no-deps api-1
            sleep 10
            docker compose -f docker/docker-compose.prod.yml up -d --no-deps api-2
            sleep 10
            docker compose -f docker/docker-compose.prod.yml up -d --no-deps api-3
            
            echo "=== Cleanup old images ==="
            docker image prune -f --filter "until=24h"
            
            echo "=== Staging deploy complete: ${{ steps.tag.outputs.tag }} ==="

      # ── Smoke Test ────────────────────────────────────────
      - name: Smoke test staging
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging-api.schoolbee.app/api/v1/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed! HTTP $STATUS"
            exit 1
          fi
          echo "Staging health check passed ✅"

      # ── Notify ────────────────────────────────────────────
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ *SchoolBee Staging Deployed* | Tag: `${{ steps.tag.outputs.tag }}` | Commit: ${{ github.sha }} | <${{ github.event.head_commit.url }}|View commit>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚨 *SchoolBee Staging Deploy FAILED* | Branch: `${{ github.ref_name }}` | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
