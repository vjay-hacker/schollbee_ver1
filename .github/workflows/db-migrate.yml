# ============================================================
# SchoolBee — Database Migration Runner
# Runs Supabase migrations safely with backup
# ============================================================

name: Database — Run Migrations

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: 'Dry run (preview only, no changes)'
        required: false
        type: boolean
        default: true

jobs:
  migrate:
    name: Run Migrations (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Set environment variables
        id: env-vars
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "project_id=${{ secrets.SUPABASE_PROD_PROJECT_ID }}" >> $GITHUB_OUTPUT
            echo "db_password=${{ secrets.SUPABASE_PROD_DB_PASSWORD }}" >> $GITHUB_OUTPUT
          else
            echo "project_id=${{ secrets.SUPABASE_STAGING_PROJECT_ID }}" >> $GITHUB_OUTPUT
            echo "db_password=${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}" >> $GITHUB_OUTPUT
          fi

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ steps.env-vars.outputs.project_id }}

      - name: Preview pending migrations (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "=== DRY RUN: Pending migrations ==="
          supabase db diff --schema public,auth
          echo "=== End of dry run. No changes applied. ==="

      - name: Apply migrations
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "=== Applying migrations to ${{ github.event.inputs.environment }} ==="
          supabase db push --password ${{ steps.env-vars.outputs.db_password }}
          echo "=== Migrations complete ==="

      - name: Refresh materialized views post-migration
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Refreshing materialized views..."
          supabase db execute --password ${{ steps.env-vars.outputs.db_password }} \
            "REFRESH MATERIALIZED VIEW CONCURRENTLY school_attendance_summary; REFRESH MATERIALIZED VIEW CONCURRENTLY student_performance_summary;"
          echo "Materialized views refreshed ✅"

      - name: Notify on completion
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🗄️ *DB Migrations Applied* | Env: `${{ github.event.inputs.environment }}` | By: @${{ github.actor }} | Commit: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
