# ============================================================
# SchoolBee — Production Deploy
# Manual approval required — never auto-deploys
# ============================================================

name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to promote to production (e.g. staging-abc1234)'
        required: true
      confirm_deploy:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true

jobs:
  # ──────────────────────────────────────────────────────────
  # Guard: Validate inputs
  # ──────────────────────────────────────────────────────────
  validate:
    name: Validate Deploy Request
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm_deploy != 'DEPLOY' }}
        run: |
          echo "Production deploy cancelled: confirmation text was '${{ github.event.inputs.confirm_deploy }}', expected 'DEPLOY'"
          exit 1

      - name: Log deploy intent
        run: |
          echo "🚀 Production deploy authorized"
          echo "Image tag: ${{ github.event.inputs.image_tag }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "At: $(date -u)"

  # ──────────────────────────────────────────────────────────
  # Approval Gate
  # ──────────────────────────────────────────────────────────
  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production        # Requires GitHub environment protection rules
      url: https://api.schoolbee.app
    steps:
      - name: Deployment approved
        run: echo "Production deployment approved by required reviewers ✅"

  # ──────────────────────────────────────────────────────────
  # Production Deploy
  # ──────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Promote staging image to production ───────────────
      - name: Pull & re-tag staging image as production
        run: |
          SOURCE_TAG="${{ github.event.inputs.image_tag }}"
          docker pull schoolbee/api:${SOURCE_TAG}
          docker tag schoolbee/api:${SOURCE_TAG} schoolbee/api:production
          docker tag schoolbee/api:${SOURCE_TAG} schoolbee/api:production-$(date +%Y%m%d%H%M)
          docker push schoolbee/api:production
          docker push schoolbee/api:production-$(date +%Y%m%d%H%M)
          echo "IMAGE_TAG=${SOURCE_TAG}" >> $GITHUB_ENV

      # ── Run DB Migrations on Production ───────────────────
      - name: Run Supabase migrations (production)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROD_PROJECT_ID }}
        run: |
          npm install -g supabase@latest
          supabase link --project-ref $SUPABASE_PROJECT_ID
          echo "Running migrations on PRODUCTION database..."
          supabase db push --password $SUPABASE_DB_PASSWORD

      # ── Create DB backup BEFORE deploy ────────────────────
      - name: Pre-deploy database backup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            /opt/schoolbee/scripts/backup-db.sh pre-deploy-$(date +%Y%m%d%H%M)
            echo "Pre-deploy backup completed"

      # ── Rolling deploy to production ──────────────────────
      - name: Rolling deploy (zero-downtime)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/schoolbee
            
            echo "=== Pulling production image ==="
            docker pull schoolbee/api:production
            export IMAGE_TAG=production
            
            echo "=== Rolling restart with health checks ==="
            for replica in api-1 api-2 api-3; do
              echo "Updating $replica..."
              docker compose -f docker/docker-compose.prod.yml up -d --no-deps $replica
              
              # Wait for health check to pass before next replica
              for i in $(seq 1 12); do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' schoolbee-$replica 2>/dev/null || echo "starting")
                echo "  $replica health: $STATUS (attempt $i/12)"
                if [ "$STATUS" = "healthy" ]; then
                  echo "  ✅ $replica is healthy"
                  break
                fi
                if [ $i -eq 12 ]; then
                  echo "  ❌ $replica failed to become healthy - rolling back"
                  exit 1
                fi
                sleep 10
              done
            done
            
            echo "=== Cleanup old images ==="
            docker image prune -f --filter "until=72h"
            
            echo "=== Production deploy complete ==="

      # ── Production smoke tests ────────────────────────────
      - name: Production smoke tests
        run: |
          sleep 20
          
          # Health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.schoolbee.app/api/v1/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed! HTTP $STATUS"
            exit 1
          fi
          echo "✅ Health check passed"
          
          # Version check
          VERSION=$(curl -s https://api.schoolbee.app/api/v1/health | jq -r '.version // "unknown"')
          echo "✅ Running version: $VERSION"

      # ── Tag the release ───────────────────────────────────
      - name: Create GitHub release tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `release-${new Date().toISOString().split('T')[0]}-${{ github.event.inputs.image_tag }}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });
            console.log(`Created release tag: ${tag}`);

      # ── Notify ────────────────────────────────────────────
      - name: Notify Slack — production deployed
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚀 *SchoolBee Production Deployed!* | Tag: `${{ github.event.inputs.image_tag }}` | By: @${{ github.actor }} | <https://api.schoolbee.app/api/v1/health|Health Check>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack — production failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚨🚨 *PRODUCTION DEPLOY FAILED* 🚨🚨 | Tag: `${{ github.event.inputs.image_tag }}` | By: @${{ github.actor }} | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs — ROLLBACK IMMEDIATELY>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
