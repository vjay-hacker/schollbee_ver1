---
# ── API ClusterIP Service ─────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: schoolbee-api
  namespace: schoolbee
  labels:
    app: schoolbee-api
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: schoolbee-api
  ports:
    - name: http
      port: 80
      targetPort: 3001
      protocol: TCP
  sessionAffinity: None    # Round-robin load balancing across pods
