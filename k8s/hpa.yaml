---
# ── HPA — Horizontal Pod Autoscaler ──────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: schoolbee-api-hpa
  namespace: schoolbee
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: schoolbee-api
  minReplicas: 3        # Always keep at least 3 for HA
  maxReplicas: 12       # Scale up to 12 during peak hours
  metrics:
    # Scale on CPU
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Scale up at 70% CPU
    # Scale on memory
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # Scale up at 80% memory
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60     # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60              # Add up to 2 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300    # Wait 5min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120             # Remove 1 pod per 2 minutes (gradual)
