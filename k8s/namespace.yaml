---
# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: schoolbee
  labels:
    app.kubernetes.io/name: schoolbee
    environment: production
---
# ── Resource Quota ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: schoolbee-quota
  namespace: schoolbee
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 16Gi
    count/pods: "20"
    count/services: "10"
---
# ── LimitRange ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: LimitRange
metadata:
  name: schoolbee-limits
  namespace: schoolbee
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
