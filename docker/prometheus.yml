# ============================================================
# SchoolBee — Prometheus Configuration
# Scrapes API, Redis exporter, Node exporter
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: schoolbee-prod
    environment: production

# Alert rules files
rule_files:
  - /etc/prometheus/rules/*.yml

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ── Scrape targets ─────────────────────────────────────────────────────────────
scrape_configs:

  # ── SchoolBee API ────────────────────────────────────────
  - job_name: 'schoolbee-api'
    static_configs:
      - targets:
          - 'api-1:3001'
          - 'api-2:3001'
          - 'api-3:3001'
        labels:
          app: schoolbee-api
          environment: production
    metrics_path: '/metrics'
    scrape_interval: 15s
    honor_labels: true

  # ── Redis ─────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          app: schoolbee-redis
    metrics_path: '/metrics'

  # ── Node Exporter (host metrics) ──────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: schoolbee-host

  # ── NGINX ─────────────────────────────────────────────────
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
        labels:
          app: schoolbee-nginx

  # ── Prometheus itself ─────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
