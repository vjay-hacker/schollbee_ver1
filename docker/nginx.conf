# ============================================
# SchoolBee — NGINX Configuration
# Reverse proxy with SSL, rate limiting, security headers
# ============================================

worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─────────────────────────────────────
    # Logging
    # ─────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ─────────────────────────────────────
    # Performance
    # ─────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    server_tokens off;

    # ─────────────────────────────────────
    # Gzip Compression
    # ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ─────────────────────────────────────
    # Rate Limiting Zones
    # ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_upload:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─────────────────────────────────────
    # Upstream — API Server
    # ─────────────────────────────────────
    upstream schoolbee_api {
        least_conn;
        server api:3001 max_fails=3 fail_timeout=30s;
        # Add more backend instances for horizontal scaling:
        # server api-2:3001 max_fails=3 fail_timeout=30s;
        # server api-3:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ─────────────────────────────────────
    # HTTP → HTTPS Redirect
    # ─────────────────────────────────────
    server {
        listen 80;
        server_name api.schoolbee.io *.schoolbee.io;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────
    # HTTPS — Main API Server
    # ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.schoolbee.io;

        # SSL Certificates (replace with your paths)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL Configuration (Mozilla Intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;

        # ─────────────────────────────────
        # Security Headers
        # ─────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

        # ─────────────────────────────────
        # Health Check (no rate limit)
        # ─────────────────────────────────
        location /api/v1/health {
            proxy_pass http://schoolbee_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─────────────────────────────────
        # Auth Endpoints (stricter rate limit)
        # ─────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=10 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://schoolbee_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ─────────────────────────────────
        # General API Endpoints
        # ─────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://schoolbee_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ─────────────────────────────────
        # WebSocket — Real-time updates
        # ─────────────────────────────────
        location /ws/ {
            proxy_pass http://schoolbee_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ─────────────────────────────────
        # Block sensitive paths
        # ─────────────────────────────────
        location ~ /\.(env|git|svn|htaccess) {
            deny all;
            return 404;
        }

        # ─────────────────────────────────
        # Default — 404
        # ─────────────────────────────────
        location / {
            return 404 '{"success":false,"error":{"code":"NOT_FOUND","message":"Resource not found"}}';
            add_header Content-Type application/json;
        }
    }
}
