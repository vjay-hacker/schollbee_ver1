# ============================================
# SchoolBee — Production Docker Compose
# Hardened for production: secrets, replicas,
# resource limits, healthchecks, log rotation
# ============================================

version: '3.9'

x-api-common: &api-common
  image: schoolbee/api:${IMAGE_TAG:-latest}
  env_file:
    - ../.env.production
  environment:
    - NODE_ENV=production
    - PORT=3001
    - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
  networks:
    - schoolbee-internal
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"
      tag: "{{.Name}}/{{.ID}}"

services:

  # ─────────────────────────────────────────────────────────────────────────────
  # SchoolBee API — 3 replicas for HA
  # ─────────────────────────────────────────────────────────────────────────────
  api-1:
    <<: *api-common
    container_name: schoolbee-api-1
    ports: []           # No direct external exposure — goes through nginx
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

  api-2:
    <<: *api-common
    container_name: schoolbee-api-2
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

  api-3:
    <<: *api-common
    container_name: schoolbee-api-3
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis — persistent, password-protected
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: schoolbee-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
      --loglevel notice
    volumes:
      - redis-data:/data
      - redis-logs:/var/log/redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - schoolbee-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 600M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────────
  # NGINX — Load balancer, SSL termination, rate limiting
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: schoolbee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - api-1
      - api-2
      - api-3
    networks:
      - schoolbee-internal
      - schoolbee-external
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ─────────────────────────────────────────────────────────────────────────────
  # Prometheus — Metrics collection
  # ─────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: schoolbee-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - schoolbee-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────────
  # Grafana — Dashboards & alerting
  # ─────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: schoolbee-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://monitor.${DOMAIN:-schoolbee.app}
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST}
      - GF_SMTP_USER=${SMTP_USER}
      - GF_SMTP_PASSWORD=${SMTP_PASS}
      - GF_SMTP_FROM_ADDRESS=alerts@${DOMAIN:-schoolbee.app}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - schoolbee-internal
    ports:
      - "3000:3000"     # Internal only — expose via nginx in production
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ─────────────────────────────────────────────────────────────────────────────
  # Loki — Log aggregation
  # ─────────────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: schoolbee-loki
    restart: unless-stopped
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - schoolbee-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ─────────────────────────────────────────────────────────────────────────────
  # Promtail — Log shipper (reads container logs → Loki)
  # ─────────────────────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.0
    container_name: schoolbee-promtail
    restart: unless-stopped
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - schoolbee-internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  redis-data:
    driver: local
  redis-logs:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  schoolbee-internal:
    driver: bridge
    name: schoolbee-internal
    internal: true        # No direct internet access
  schoolbee-external:
    driver: bridge
    name: schoolbee-external  # Only nginx touches this
