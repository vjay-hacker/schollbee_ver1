# ============================================
# SchoolBee — Docker Compose
# Development & Production orchestration
# ============================================

version: '3.9'

services:
  # ─────────────────────────────────────────
  # SchoolBee API Server
  # ─────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: schoolbee-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - FCM_PROJECT_ID=${FCM_PROJECT_ID}
      - FCM_CLIENT_EMAIL=${FCM_CLIENT_EMAIL}
      - FCM_PRIVATE_KEY=${FCM_PRIVATE_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - schoolbee-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Redis — Cache, Pub/Sub, Sessions, Queues
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: schoolbee-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schoolbee-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M

  # ─────────────────────────────────────────
  # NGINX — Reverse Proxy & Load Balancer
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: schoolbee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - schoolbee-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ─────────────────────────────────────────
  # Redis Commander — Redis GUI (Dev only)
  # ─────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: schoolbee-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - schoolbee-network
    profiles:
      - dev

volumes:
  redis-data:
    driver: local

networks:
  schoolbee-network:
    driver: bridge
    name: schoolbee-network
